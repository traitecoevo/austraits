url: https://traitecoevo.github.io/austraits/
development:
  mode: release
template:
  bootstrap: 5
  bootswatch: litera
  
navbar:
  bg: light
  type: light
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    reference:
      text: Functions Index
      href: reference/index.html
    articles:
      text: Documentation
      menu:
      - text: About AusTraits
      - text: Structure of AusTraits
        href: 'articles/structure.html'
      - text: Defintions of traits
        href: articles/dictionary.html
      - text: -------
      - text: Version 3.0.2 and older
      - text: Get Started 
        href: articles/austraits_older.html
    intro:
      text: Get Started (4.0.0 or newer)
      href: articles/austraits.html

    
reference:
- title: Accessing and exploring AusTraits
- contents:
  - starts_with("load")
  - download_austraits
  - starts_with("get_")
  - summarise_austraits
  - lookup_trait
  - print.austraits
- title: Wrangling AusTraits
  desc: Functions to extract, pivot and join data
- contents:
  - starts_with("extract")
  - starts_with("trait_pivot")
  - summarise_trait_means
  - starts_with("join")
  - ends_with("trait_values")
  - as_wide_table
- title: Quick data visualisations
  desc: Plot site or variance distributions
- contents:
  - plot_locations
  - plot_trait_distribution_beeswarm
- title: internal
  contents:
  - create_metadata
  - list1_to_df
  - starts_with("my_kable")
  - plot_site_locations
